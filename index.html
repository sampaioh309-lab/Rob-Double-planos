<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SISTEMA I.A - Double Blaze</title>

<style>
*{box-sizing:border-box}
html,body{width:100%;height:100%;margin:0}

body{
background:#020617;
font-family:Arial;
color:#e5e7eb;
overflow:hidden
}

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0
}

/* AVISO DE EXPIRAÇÃO AUTOMÁTICO */
.aviso-expiracao {
position: relative;
z-index:10;
background: linear-gradient(90deg, #7f1d1d, #b91c1c);
color: #ffffff;
text-align: center;
padding: 8px 4px;
font-size: 11px;
font-weight: bold;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 4px;
border-bottom: 2px solid #ef4444;
box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
}

.btn-suporte {
background: #facc15;
color: #020617;
border: none;
padding: 4px 10px;
font-size: 10px;
font-weight: 900;
border-radius: 4px;
cursor: pointer;
text-transform: uppercase;
transition: transform 0.2s;
}

.btn-suporte:hover {
transform: scale(1.05);
}

#app{
position:relative;
z-index:2;
max-width:420px;
height:calc(100vh - 55px);
margin:auto;
padding:6px;
display:flex;
flex-direction:column;
gap:6px;
text-align:center
}

.titulo{font-size:20px;font-weight:900;color:#00aaff}
.versao{font-size:13px;font-weight:900;color:#00aaff}

#placar{
display:flex;
justify-content:space-between;
font-size:11px;
align-items:center
}

.green-neon{color:#22c55e}
.red-neon{color:#ef4444}
.white-neon{color:#facc15}

#linha{
display:flex;
gap:4px;
overflow-x:auto;
font-size:16px;
padding:4px
}

#botoes{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:4px
}

button{
padding:6px;
font-size:11px;
font-weight:bold;
border:none;
border-radius:8px;
cursor:pointer;
}

.red{background:#7f1d1d;color:#fff}
.black{background:#020617;color:#fff;border:1px solid #555}
.white{background:#fff;color:#020617}

#result{
min-height:40px;
font-size:13px;
font-weight:bold
}

.green-chamativo{
font-size:28px;
font-weight:900;
color:#00ff55;
text-shadow:0 0 20px #00ff55
}

#desempenho,#lista{
position:fixed;
top:0;left:0;width:100%;height:100%;
background:#020617;
z-index:999;
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
overflow:auto
}

.grade{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:8px;
padding:10px;
width:100%;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="aviso-expiracao">
<span id="texto-aviso">Calculando licença...</span>
<button class="btn-suporte" id="btn-suporte" onclick="irParaSuporte()">Adquirir Nova Versão PRO 🚀</button>
</div>

<div id="app">

<div>
<div class="titulo">SISTEMA I.A</div>
<div class="versao">V:10 PRO</div>
<div id="hora"></div>
</div>

<div id="placar">
<span class="green-neon">GREEN <b id="greens">0</b></span>
<span class="red-neon">LOSS <b id="losses">0</b></span>
<span class="white-neon">BRANCO <b id="brancos">0</b></span>

<button onclick="resetarPlacar()" style="padding:2px 6px;font-size:9px;background:#111;color:#fff;border:1px solid #333;border-radius:5px">
Reset
</button>
</div>

<div id="linha"></div>

<div id="botoes">
<button class="red" onclick="add('R')">🔴</button>
<button class="black" onclick="add('B')">⚫</button>
<button class="white" onclick="add('W')">⚪</button>
</div>

<div id="result">⏸️ AGUARDAR</div>

<button onclick="abrirDesempenho()">📊 Meu Desempenho</button>

</div>

<div id="desempenho">
<h2>📊 DESEMPENHO</h2>

<button onclick="verLista()">📅 Ver Histórico</button>

<button onclick="resetarDesempenho()" style="margin-top:10px;background:#7f1d1d;color:#fff">
🗑 Resetar Desempenho
</button>

<button onclick="fecharDesempenho()">Fechar</button>
</div>

<div id="lista">
<h2 id="tituloLista"></h2>
<div id="conteudoLista" class="grade"></div>
<button onclick="fecharLista()">Voltar</button>
</div>

<script>

/* MATRIX */
const canvas=document.getElementById("matrix")
const ctx=canvas.getContext("2d")
canvas.width=window.innerWidth
canvas.height=window.innerHeight

const letters="01アイウエオ"
const fontSize=14
const columns=canvas.width/fontSize
const drops=[]

for(let x=0;x<columns;x++){drops[x]=1}

function draw(){
ctx.fillStyle="rgba(2,6,23,0.15)"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="#00aaff"
ctx.font=fontSize+"px monospace"

for(let i=0;i<drops.length;i++){
const text=letters[Math.floor(Math.random()*letters.length)]
ctx.fillText(text,i*fontSize,drops[i]*fontSize)

if(drops[i]*fontSize>canvas.height && Math.random()>0.975){
drops[i]=0
}
drops[i]++
}
}
setInterval(draw,33)

/* CONTROLE DE EXPIRAÇÃO AUTOMÁTICA */
let urlSuporte = "https://wa.me/5511987401582";

function gerenciarExpiracao() {
    // Defina a data final da licença aqui (Ano, Mês-1, Dia) -> Junho é mês 5 no JS (0=Jan, 1=Fev...)
    const dataExpiracao = new Date(2026, 5, 29); 
    const hoje = new Date();
    
    // Zera as horas para calcular apenas a diferença de dias inteiros
    hoje.setHours(0,0,0,0);
    dataExpiracao.setHours(0,0,0,0);
    
    const diferencaTempo = dataExpiracao.getTime() - hoje.getTime();
    const diasRestantes = Math.ceil(diferencaTempo / (1000 * 60 * 60 * 24));
    
    const txtAviso = document.getElementById("texto-aviso");
    const btnSuporte = document.getElementById("btn-suporte");
    
    if (diasRestantes > 0) {
        txtAviso.innerText = `⚠️ DETECTADO: Sua licença atual vai se expirar em ${diasRestantes} dias!`;
        urlSuporte = `https://wa.me/5511987401582?text=Ol%C3%A1%2C%20meu%20rob%C3%B4%20vai%20expirar%20em%20${diasRestantes}%20dias%20e%20gostaria%20de%20adquirir%20o%20plano%20da%20nova%20vers%C3%A3o%20PRO%21`;
    } else {
        txtAviso.innerText = "❌ SUA LICENÇA EXPIROU! REATIVE O SEU ACESSO.";
        btnSuporte.innerText = "RENOVAR LICENÇA AGORA 🔐";
        urlSuporte = "https://wa.me/5511987401582?text=Ol%C3%A1%2C%20minha%20licen%C3%A7a%20expirou%20e%20quero%20renovar%20para%20a%20nova%20vers%C3%A3o%20PRO%21";
    }
}

function irParaSuporte() {
    window.open(urlSuporte, '_blank');
}

// Executa o cálculo ao carregar a página
gerenciarExpiracao();


/* SISTEMA */
const greensEl=document.getElementById("greens")
const lossesEl=document.getElementById("losses")
const brancosEl=document.getElementById("brancos")
const linha=document.getElementById("linha")
const result=document.getElementById("result")

let greens=0,losses=0,brancos=0
let seq=[],sinal=null,gale=0
let historico=[]

function salvarDados(){
localStorage.setItem("roboBlaze", JSON.stringify({greens,losses,brancos,historico}))
}

function carregarDados(){
let d=JSON.parse(localStorage.getItem("roboBlaze"))
if(!d)return
greens=d.greens||0
losses=d.losses||0
brancos=d.brancos||0
historico=d.historico||[]

greensEl.innerText=greens
lossesEl.innerText=losses
brancosEl.innerText=brancos
}
carregarDados()

function resetarPlacar(){
greens=0;losses=0;brancos=0
greensEl.innerText=0
lossesEl.innerText=0
brancosEl.innerText=0
salvarDados()
}

function resetarDesempenho(){
if(!confirm("Apagar desempenho?")) return
historico=[]
salvarDados()
conteudoLista.innerHTML=""
}

function registrar(tipo,cor,galeUsado){
let agora=new Date()
historico.push({
tipo: tipo,
cor: col,
hora: agora.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}),
data: agora.toLocaleDateString("pt-BR"),
gale: galeUsado
})
salvarDados()
}

function add(c){

seq.push(c)

let el=document.createElement("span")
el.innerText=c==="R"?"🔴":c==="B"?"⚫":"⚪"
linha.appendChild(el)
linha.scrollLeft=linha.scrollWidth

if(sinal){

if(c==="W"){
greens++; brancos++
greensEl.innerText=greens
brancosEl.innerText=brancos
registrar("green","W",gale)
result.innerHTML="<div class='green-chamativo'>⚪🟢 GREEN BRANCO</div>"
resetar()
return
}

if(c===sinal){
greens++
greensEl.innerText=greens
registrar("green",sinal,gale)
result.innerHTML="<div class='green-chamativo'>🟢 GREEN</div>"
resetar()
return
}else{

if(gale===0){
gale=1
result.innerHTML="♻️ ENTRAR G1"
return
}else{
losses++
lossesEl.innerText=losses
registrar("loss",sinal,gale)
result.innerHTML="❌ LOSS"
resetar()
return
}

}
}

if(seq.length<6)return

let entrada=seq[seq.length-6]

if(seq.slice(-3).includes("W")) return
if(entrada==="W") return

sinal=entrada

result.innerHTML="📡 SINAL<br>Apostar "+(sinal==="R"?"🔴":"⚫")+"<br>♻️ Até G1<br>⚪ Proteção Branco"
}

function resetar(){sinal=null;gale=0}

/* HISTÓRICO QUADRADINHO */
function verLista(){

desempenho.style.display="none"
lista.style.display="flex"
conteudoLista.innerHTML=""

let agrupado={}

historico.forEach(h=>{
let data=h.data||"Antigos"
if(!agrupado[data]) agrupado[data]=[]
agrupado[data].push(h)
})

Object.keys(agrupado).reverse().forEach(data=>{

let itens=agrupado[data]

function montar(lista,titulo){

if(lista.length===0)return""

return `
<div style="margin-top:10px">
<b>${titulo} ${lista.length}</b>

<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:5px">

${lista.map(i=>{

let bg=i.cor==="R"?"#ef4444":i.cor==="B"?"#111":"#f1f1f1"
let cor=i.cor==="W"?"#000":"#fff"
let emoji=i.cor==="R"?"🔴":i.cor==="B"?"⚫":"⚪"

return `
<div style="border-radius:8px;background:${bg};color:${cor};padding:6px;text-align:center;font-size:11px;font-weight:bold">
<div>${i.hora}</div>
<div style="font-size:16px">${emoji}</div>
</div>
`

}).join("")}

</div>
</div>
`
}

conteudoLista.innerHTML+=`
<div style="grid-column:span 5;padding:10px;border-bottom:1px solid #333;text-align:left">

<div style="color:#00aaff;font-weight:bold;margin-bottom:5px">${data}</div>

${montar(itens.filter(h=>h.tipo==="green"&&h.cor!=="W"),"🟢 GREEN")}
${montar(itens.filter(h=>h.tipo==="loss"),"🔴 LOSS")}
${montar(itens.filter(h=>h.cor==="W"),"⚪ BRANCO")}

</div>
`
})

tituloLista.innerText="HISTÓRICO"
}

function abrirDesempenho(){desempenho.style.display="flex"}
function fecharDesempenho(){desempenho.style.display="none"}
function fecharLista(){lista.style.display="none";desempenho.style.display="flex"}

function atualizarHora(){
let agora=new Date(new Date().toLocaleString("en-US",{timeZone:"America/Sao_Paulo"}))
hora.innerText="🕒 "+agora.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"})
}
setInterval(atualizarHora,1000)

</script>

</body>
</html>
